project:
  type: website
  resources:
    - "/optimise_examples/"
  output-dir: _site
  render:
    - "*.qmd"
    - "docs/"
    - "api_reference/"
    - "!materials/"
    - "!todo.qmd"

website:
  title: "digiqual"
  repo-url: https://github.com/JGIBristol/digiqual
  repo-actions: [edit, issue]
  page-navigation: true

  navbar:
    background: primary
    foreground: light
    search: true
    right:
      - icon: github
        href: https://github.com/JGIBristol/digiqual
        aria-label: GitHub

# --- 1. YOUR MANUAL SIDEBAR ---
  sidebar:
    style: floating
    collapse-level: 1
    search: true
    contents:
      - text: "Home"
        href: index.qmd

      - section: "Getting Started"
        contents:
          - text: "Installation & Setup"
            href: docs/install.qmd
          - text: "Python Quick Start"
            href: docs/qs_class.qmd
          - text: "Launch the App"
            href: docs/gui.qmd

      - section: "Detailed Manuals & Theory"
        contents:
          - text: "GUI Desktop Manual"
            href: docs/gui_manual.qmd
          - text: "Automated Optimisation"
            href: docs/optimisation.qmd
          - text: "Generalised PoD Theory"
            href: docs/generalised_pod.qmd
          - text: "Classical vs Generalised PoD"
            href: docs/comparison.qmd

      - text: "API Reference"
        href: api_reference/index.qmd


format:
  html:
    theme: [cosmo, custom.scss]
    toc: true
    page-layout: article
    code-copy: true
    mainfont: "Inter, system-ui, -apple-system, sans-serif"
    fontcolor: "#212529"
    backgroundcolor: "#f9fafb"

# --- 2. QUARTODOC CONFIG ---
quartodoc:
  package: digiqual
  dir: api_reference
  parser: google
  title: "All Functions"

  # Global Options
  options:
    dynamic: true
    signature_name: short

  # --- 3. PAGE GENERATION ---
  # This builds the content for "api_reference/index.qmd"
  sections:
    # SECTION A: THE STANDARD USER
    - title: "Standard Workflow"
      desc: "The core class for managing reliability studies."
      contents:
        - name: core.SimulationStudy
          children: separate

    # SECTION B: THE DESKTOP APP
    - title: "Graphical User Interface"
      desc: "Launch the standalone DigiQual dashboard locally."
      contents:
        - dq_ui

    # SECTION C: THE POWER USER
    - title: "Functional API"
      desc: "Standalone tools for Sampling, Diagnostics, PoD, and Plotting."
      contents:
        # -- Sampling --
        - sampling.generate_lhs

        # -- Diagnostics --
        - diagnostics.validate_simulation
        - diagnostics.sample_sufficiency
        - diagnostics.ValidationError

        # -- Adaptive --
        - adaptive.run_adaptive_search
        - adaptive.generate_targeted_samples

        # -- PoD Analysis --
        - pod.fit_robust_mean_model
        - pod.optimise_bandwidth
        - pod.fit_variance_model
        - pod.infer_best_distribution
        - pod.plot_model_selection
        - pod.predict_local_std
        - pod.compute_pod_curve
        - pod.bootstrap_pod_ci
        - pod.calculate_reliability_point

        # -- Integration --
        - integration.compute_multi_dim_pod

        # -- Classical Linear PoD --
        - ahat.fit_linear_a_hat_model
        - ahat.compute_linear_pod_curve
        - ahat.bootstrap_linear_pod_ci
        - ahat.plot_linear_signal_model

        # -- Plotting --
        - plotting.plot_signal_model
        - plotting.plot_pod_curve
        - plotting.plot_pod_surface
        - plotting.plot_signal_surface

        # -- Optimise/Executor --
        - executors.Executor
        - executors.PythonExecutor
        - executors.CLIExecutor
        - executors.MatlabExecutor
